version: '3.8'

services:
  # PostgreSQL Database (optional, can use SQLite instead)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: weather_data
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: weather_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_data"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Weather Data Pipeline Application
  weather-pipeline:
    build: .
    environment:
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=weather_data
      - DB_USER=weather_user
      - DB_PASSWORD=weather_password
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - APP_LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8050:8050"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "src.weather_pipeline.cli", "dashboard"]

  # Data Collection Service (runs in background)
  weather-collector:
    build: .
    environment:
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=weather_data
      - DB_USER=weather_user
      - DB_PASSWORD=weather_password
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - APP_LOG_LEVEL=INFO
      - APP_INGESTION_INTERVAL_MINUTES=60
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "src.weather_pipeline.cli", "schedule"]

volumes:
  postgres_data: